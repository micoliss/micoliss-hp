# リマインドの定期実行。GitHubが30分おきにMicolissの送信チェック用URLを叩く（無料・新規登録不要）。
# 送信判定・文面・LINE/メール送信は /api/cron-remind 側で行う。
# 前日リマインド(18:00)と当日リマインド(08:00)は送信時刻ゲート＋rem_*フラグ方式なので、
# 巡回が多少遅れても「その時刻を過ぎた次の巡回」で1回だけ送られる（二重送信しない）。
name: reminder

on:
  schedule:
    - cron: "*/30 * * * *"   # 30分おき（UTC基準。混雑時は数分〜十数分遅延することがある）
  workflow_dispatch:           # 手動実行も可能（Actions画面のRun workflow）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders
        run: curl -fsS "https://micoliss-hp.vercel.app/api/cron-remind"
