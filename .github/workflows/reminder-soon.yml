# 予約1時間前リマインドの定期実行。
# GitHub Actionsが10分おきにMicolissの送信チェック用URLを叩く（無料・新規登録不要）。
# 実際の送信判定・LINE送信は /api/cron-remind?slot=soon 側で行う。
name: reminder-soon

on:
  schedule:
    - cron: "*/10 * * * *"   # 10分おき（UTC基準。混雑時は数分〜十数分遅延することがある）
  workflow_dispatch:           # 手動実行も可能（Actions画面のRun workflow）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders
        run: curl -fsS "https://micoliss-hp.vercel.app/api/cron-remind"
